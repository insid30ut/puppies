<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheer Up! | Cute Animals</title>
    <meta name="description"
        content="A simple website to brighten your day with cute animal pictures that update automatically.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="container">
        <header>
            <h1>Your Online Stress Ball</h1>
            <p>Enjoy!! This one's for you Heather</p>
        </header>

        <main>
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p>Finding the cutest animals...</p>
            </div>
            <div id="gallery" class="gallery hidden">
                <!-- Images will be injected here via JavaScript -->
            </div>
        </main>

        <footer>
            <p>Designed to make your day better ☀️</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
